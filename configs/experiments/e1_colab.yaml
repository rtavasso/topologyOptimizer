# E1 for a single Colab GPU session: the spec's E1 crux, sized to finish in one
# session. Larger than the smoke config, smaller than the full 5000-step E1.
# Run with `--device cuda`.
experiment:
  name: e1_colab
  seeds: [0, 1, 2, 3, 4]
  split_seed: 0

data:
  type: gaussian_matrix_regression
  input_dim: 64
  output_dim: 32
  batch_size: 256
  steps: 2000
  input_covariance:
    type: power_law
    alpha: 1.0
  teacher:
    type: prescribed_spectrum
    rank: 16
    spectrum: geometric
    condition_number: 50
  noise_std: 0.01
  validation_size: 4096

model:
  type: deep_linear
  dimensions: [64, 128, 32]
  bias: false
  initialization: xavier

optimizer:
  type: adamw
  learning_rate: 0.001
  betas: [0.9, 0.999]
  weight_decay: 0.0

logging:
  full_tensor_every: 1
  svd_every: 5
  validation_every: 25
  checkpoint_every: 100
  svd_rank: 16
  random_probe_count: 16
  activation_probe_count: 16
  probe_kind: gaussian

dynamics_dataset:
  # session-sized: 2 targets x 3 horizons. The full e1.yaml additionally covers
  # weight_delta + gradient_subspace and horizons up to 100.
  history_lengths: [16]
  horizons: [1, 8, 32]
  targets: [future_gradient, probe_action]
  representations: [R1, R2, R3, R5]
  node_feat_dim: 128
  # stride between window anchors. With high-dim targets (the 8192-dim full-E1
  # gradient) fully-overlapping windows (stride=1) blow up RAM; stride 8 keeps
  # the dense history-window tensors small enough for a Colab instance.
  window_stride: 8

eval:
  history_length: 16
  targets: [future_gradient, probe_action]
  horizons: [1, 8, 32]

predictor_config:
  epochs: 60
  hidden: 128
  lr: 0.001
  device: cuda

online:
  steps: 600

predictors:
  - persistence
  - constant_velocity
  - ridge
  - tuned_ema
  - vector_autoregression
  - dmd_koopman
  - online_subspace_tracker
  - periodic_svd
  - analytic_contraction
  - slow_subspace_fast_coordinate
  - layer_gru
  - topology_graph_gru
  - residualized_topology_graph_gru
